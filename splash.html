<!doctype html>
<html lang="nl">
<head>
<meta charset="utf-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; -webkit-user-select: none; user-select: none; }
  body {
    display: flex; align-items: center; justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: radial-gradient(120% 120% at 30% 0%, #16273f 0%, #0c1a2e 55%, #08111f 100%);
    color: #fff;
  }
  .wrap { text-align: center; animation: rise .5s ease-out both; }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .emblem {
    width: 92px; height: 92px; margin: 0 auto 22px; border-radius: 22px;
    background: linear-gradient(160deg, #16273f, #0c1a2e);
    border: 1px solid rgba(255,255,255,.06);
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .emblem span { font-size: 44px; font-weight: 900; letter-spacing: -.04em; color: #ED6A1C; }
  .word { font-size: 22px; font-weight: 800; letter-spacing: .01em; }
  .word b { color: #ED6A1C; }
  .os { font-size: 11px; font-weight: 700; letter-spacing: .26em; color: #6b7d93; text-transform: uppercase; margin-top: 6px; }
  .bar { width: 168px; height: 3px; border-radius: 3px; background: rgba(255,255,255,.08); margin: 26px auto 0; overflow: hidden; }
  .bar i { display: block; height: 100%; width: 40%; border-radius: 3px;
    background: linear-gradient(90deg, transparent, #ED6A1C, transparent);
    animation: slide 1.1s ease-in-out infinite; }
  @keyframes slide { 0% { transform: translateX(-120%); } 100% { transform: translateX(320%); } }
  .hint { margin-top: 14px; font-size: 11.5px; color: #5a6b80; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="emblem"><span>VV</span></div>
    <div class="word">Van&nbsp;Vliet<b>.</b></div>
    <div class="os">Operating System</div>
    <div class="bar"><i></i></div>
    <div class="hint">Verbinden…</div>
  </div>
</body>
</html>
